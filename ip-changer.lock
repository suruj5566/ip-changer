#!/usr/bin/env bash
REAL_PASS="SURUJ@2026"
MAX_ATTEMPTS=3
attempt=0

while [ $attempt -lt $MAX_ATTEMPTS ]; do
    read -r -s -p "Enter password to unlock IP Changer: " user_pass
    echo
    if [ "$user_pass" = "$REAL_PASS" ]; then
        exec "$(dirname "$0")/ip-changer.sh" "$@"
    fi
    attempt=$((attempt + 1))
    echo "Wrong password. Attempts left: $((MAX_ATTEMPTS - attempt))"
done

exit 1